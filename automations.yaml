- id: '1763741081020'
  alias: Buitenverlichting standaard
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sun.sun
    from:
    - above_horizon
    to:
    - below_horizon
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - alias: Datum geen sinterklaas,kerst,nieuwjaar
    condition: template
    value_template: '{{ not(

      now().month == 12 and now().day == 5

      or now().month == 12 and now().day == 6

      or (now().month == 12 and now().day >= 23

      and now().month == 12 and now().day < 27)

      or now().month == 12 and now().day == 31

      )

      }} '
  actions:
  - action: light.turn_on
    metadata: {}
    data:
      color_temp_kelvin: 2204
      brightness_pct: 60
    target:
      entity_id: light.buiten_lichten
  mode: single
