- id: '1770926081886'
  alias: 'Screens: Vakantiemodus (Daan, Eva, Master)'
  description: Beheert screens tijdens vakantie met temperatuur- en positiecheck
  triggers:
  - at: '10:00:00'
    id: alles_open
    trigger: time
  - at: '21:00:00'
    id: daan_dicht
    trigger: time
  - at: '22:00:00'
    id: eva_dicht
    trigger: time
  - at: '22:30:00'
    id: master_dicht
    trigger: time
  conditions:
  - condition: state
    entity_id: input_boolean.vakantie
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: alles_open
      - condition: numeric_state
        entity_id: sensor.buitentemperatuur_24u_gemiddelde
        above: 5
      - condition: numeric_state
        entity_id: sensor.outdoor_temperature
        above: 5
      sequence:
      - if:
        - condition: template
          value_template: '{{ state_attr(''cover.daan_alles'', ''current_position'')
            | int != 100 }}'
        then:
        - action: cover.open_cover
          target:
            entity_id: cover.daan_alles
      - if:
        - condition: template
          value_template: '{{ state_attr(''cover.eva_alles'', ''current_position'')
            | int != 100 }}'
        then:
        - action: cover.open_cover
          target:
            entity_id: cover.eva_alles
      - if:
        - condition: template
          value_template: '{{ state_attr(''cover.master_alles'', ''current_position'')
            | int != 100 }}'
        then:
        - action: cover.open_cover
          target:
            entity_id: cover.master_alles
    - conditions:
      - condition: trigger
        id: daan_dicht
      - condition: template
        value_template: '{{ state_attr(''cover.daan_alles'', ''current_position'')
          | int != 0 }}'
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.daan_alles
    - conditions:
      - condition: trigger
        id: eva_dicht
      - condition: template
        value_template: '{{ state_attr(''cover.eva_alles'', ''current_position'')
          | int != 0 }}'
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.eva_alles
    - conditions:
      - condition: trigger
        id: master_dicht
      - condition: template
        value_template: '{{ state_attr(''cover.master_alles'', ''current_position'')
          | int != 0 }}'
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.master_alles
  mode: parallel
  max: 10
- id: '1771342252165'
  alias: 'Kantoor Rob: Aanwezigheid, Licht en Klimaat (Verbeterd)'
  description: Schakelt licht direct in bij aanwezigheid en lage lichtsterkte. Regelt
    klimaat (verwarmen/koelen) pas na 5 minuten continue aanwezigheid.
  triggers:
  - entity_id: binary_sensor.presense_kantoor_rob_presence
    from: 'off'
    to: 'on'
    id: aanwezig_direct
    trigger: state
  - entity_id: binary_sensor.presense_kantoor_rob_presence
    from: 'off'
    to: 'on'
    for:
      minutes: 5
    id: aanwezig_klimaat
    trigger: state
  - entity_id: sensor.hue_sensor_kantoor_rob_illuminance
    below: 20
    id: donker
    trigger: numeric_state
  - entity_id: sensor.hue_sensor_kantoor_rob_temperature
    trigger: state
    id: temp_update
  - entity_id: binary_sensor.presense_kantoor_rob_presence
    from: 'on'
    to: 'off'
    id: afwezig
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: aanwezig_direct
        - condition: trigger
          id: donker
      - condition: state
        entity_id: binary_sensor.presense_kantoor_rob_presence
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.hue_sensor_kantoor_rob_illuminance
        below: 19
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.gameroom_lamp_1
    - conditions:
      - condition: state
        entity_id: binary_sensor.presense_kantoor_rob_presence
        state: 'on'
        for:
          minutes: 5
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: sensor.hue_sensor_kantoor_rob_temperature
            below: 17
          sequence:
          - action: fan.turn_on
            target:
              entity_id: fan.philips_air_8000
          - action: select.select_option
            target:
              entity_id: select.philips_air_8000_functie
            data:
              option: heating
        - conditions:
          - condition: numeric_state
            entity_id: sensor.hue_sensor_kantoor_rob_temperature
            above: 26
          sequence:
          - action: fan.turn_on
            target:
              entity_id: fan.philips_air_8000
          - action: select.select_option
            target:
              entity_id: select.philips_air_8000_functie
            data:
              option: fan
        - conditions:
          - condition: numeric_state
            entity_id: sensor.hue_sensor_kantoor_rob_temperature
            above: 17.5
          - condition: numeric_state
            entity_id: sensor.hue_sensor_kantoor_rob_temperature
            below: 25.5
          sequence:
          - action: select.select_option
            target:
              entity_id: select.philips_air_8000_functie
            data:
              option: circulation
    - conditions:
      - condition: trigger
        id: afwezig
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.gameroom_lamp_1
      - action: fan.turn_off
        target:
          entity_id: fan.philips_air_8000
  mode: restart
- id: '1771537266654'
