- id: '1760724910302'
  alias: 'Vaatwasser: Plannen en Starten'
  description: Berekent eenmalig de starttijd bij aanzetten knop en voert daarna de
    start-acties uit
  triggers:
  - trigger: state
    entity_id: input_boolean.vaatwassergevuld
    to: 'on'
    id: plannen
  - trigger: time
    at: input_datetime.vaatwasser_geplande_starttijd
    id: starten
  - trigger: numeric_state
    entity_id: sensor.solax_huis_now
    above: 1500
    for:
      minutes: 2
    id: starten
  conditions:
  - condition: state
    entity_id: input_boolean.vaatwassergevuld
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: select.012030387010009525_programs
      state: unavailable
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: plannen
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.vaatwasser_geplande_starttijd
        data:
          timestamp: "{% set p = state_attr('sensor.tibber_forecast_prices', 'prices')
            %} {% if p is not none and p | length > 0 %}\n  {% set is_eco = is_state('input_boolean.vaatwasserecoprog',
            'on') %}\n  {% set duur = 5 if is_eco else 1 %}\n  {% set start_venster
            = now() %}\n  {% set eind_venster = start_venster + timedelta(hours=12)
            %}\n  {% set relevante_prijzen = p | selectattr('start_time', 'defined')\n
            \                             | map(attribute='start_time')\n                              |
            map('as_datetime')\n                              | select('gt', start_venster)\n
            \                             | select('lt', eind_venster)\n                              |
            list %}\n  {% set ns = namespace(laagste_prijs=999, beste_start=now())
            %}\n  {% for start_tijd in relevante_prijzen %}\n    {% set eind_tijd
            = start_tijd + timedelta(hours=duur) %}\n    {% set ns_blok = namespace(totaal=0,
            aantal=0) %}\n    {% for prijs_punt in p %}\n      {% set pt = as_datetime(prijs_punt.start_time)
            %}\n      {% if pt >= start_tijd and pt < eind_tijd %}\n        {% set
            ns_blok.totaal = ns_blok.totaal + prijs_punt.price %}\n        {% set
            ns_blok.aantal = ns_blok.aantal + 1 %}\n      {% endif %}\n    {% endfor
            %}\n    {% if ns_blok.aantal >= (duur | int) %}\n      {% set gemiddelde
            = ns_blok.totaal / ns_blok.aantal %}\n      {% if gemiddelde < ns.laagste_prijs
            %}\n        {% set ns.laagste_prijs = gemiddelde %}\n        {% set ns.beste_start
            = start_tijd %}\n      {% endif %}\n    {% endif %}\n  {% endfor %}\n
            \ {{ as_timestamp(ns.beste_start) }}\n{% else %}\n  {{ as_timestamp(now())
            }}\n{% endif %}\n"
    - conditions:
      - condition: trigger
        id: starten
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.vaatwassersnelprog
            state: 'on'
          sequence:
          - action: select.select_option
            target:
              entity_id: select.012030387010009525_programs
            data:
              option: Dishcare.Dishwasher.Program.Quick65
          - delay:
              seconds: 5
          - action: home_connect_alt.start_program
            data:
              device_id: fcacf0066c1b53d2b1bcb4a94d63ec60
              program_key: Dishcare.Dishwasher.Program.Quick65
              options: []
        - conditions:
          - condition: state
            entity_id: input_boolean.vaatwasserecoprog
            state: 'on'
          sequence:
          - action: select.select_option
            target:
              entity_id: select.012030387010009525_programs
            data:
              option: Dishcare.Dishwasher.Program.Eco50
          - delay:
              seconds: 5
          - action: home_connect_alt.start_program
            data:
              device_id: fcacf0066c1b53d2b1bcb4a94d63ec60
              program_key: Dishcare.Dishwasher.Program.Eco50
              options: []
      - action: input_boolean.turn_off
        target:
          entity_id:
          - input_boolean.vaatwassergevuld
          - input_boolean.vaatwassersnelprog
          - input_boolean.vaatwasserecoprog
