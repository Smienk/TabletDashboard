- id: '1772724760127'
  alias: 'Warmtepomp: Boost Controller - Centraal'
  description: Beheert zowel zon-overschot als handmatige activatie van de warmtepomp
    boost
  triggers:
  - entity_id: input_boolean.warmtepomp_handmatige_activatie
    from: 'off'
    to: 'on'
    id: handmatig
    trigger: state
  - entity_id: binary_sensor.warmtepomp_boost_zon_overschot
    trigger: state
    id: zon_check
  - entity_id: water_heater.domestic_hot_water_tank
    attribute: current_temperature
    trigger: state
    id: zon_check
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: handmatig
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: water_heater.domestic_hot_water_tank
            attribute: current_temperature
            above: 35
          sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.warmtepomp_handmatige_activatie
          - action: telegram_bot.send_message
            data:
              title: "\U0001F916 WP Status Update"
              chat_id: '-1001731338740'
              message_thread_id: '44275'
              parse_mode: html
              message: '⚠️ <b>BOOST GEWEIGERD</b>

                Handmatig niet nodig. Water is al {{ state_attr(''water_heater.domestic_hot_water_tank'',
                ''current_temperature'') }}°C.'
        - conditions:
          - condition: numeric_state
            entity_id: water_heater.domestic_hot_water_tank
            attribute: current_temperature
            below: 35
          sequence:
          - action: water_heater.set_operation_mode
            target:
              entity_id: water_heater.domestic_hot_water_tank
            data:
              operation_mode: performance
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.warmtepompboost
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.warmtepomp_handmatige_activatie
          - action: telegram_bot.send_message
            data:
              title: "\U0001F916 WP Status Update"
              chat_id: '-1001731338740'
              message_thread_id: '44275'
              message: "\U0001F680 <b>BOOST HANDMATIG INGESCHAKELD</b>"
    - conditions:
      - condition: trigger
        id: zon_check
      - condition: state
        entity_id: binary_sensor.warmtepomp_boost_zon_overschot
        state: 'on'
      - condition: numeric_state
        entity_id: water_heater.domestic_hot_water_tank
        attribute: current_temperature
        below: 56
      - condition: state
        entity_id: input_boolean.warmtepompboost
        state: 'off'
      sequence:
      - action: water_heater.set_operation_mode
        target:
          entity_id: water_heater.domestic_hot_water_tank
        data:
          operation_mode: performance
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.warmtepompboost
      - action: telegram_bot.send_message
        data:
          title: ☀️ WP Status Update
          chat_id: '-1001731338740'
          message_thread_id: '44275'
          parse_mode: html
          message: "\U0001F680 <b>BOOST (ZON) INGESCHAKELD</b>\nTemperatuur: {{ state_attr('water_heater.domestic_hot_water_tank',
            'current_temperature') }}°C."
  mode: restart
- id: '1772724795261'
  alias: 'Warmtepomp: Boost Controller - Uitschakelen'
  description: Beheert het uitschakelen van de boost modus
  triggers:
  - entity_id: input_boolean.warmtepompboost
    from: 'on'
    to: 'off'
    id: knop_uit
    trigger: state
  - entity_id: water_heater.domestic_hot_water_tank
    attribute: current_temperature
    above: 57
    id: max_temp
    trigger: numeric_state
  - entity_id: binary_sensor.warmtepomp_boost_zon_overschot
    from: 'on'
    to: 'off'
    id: zon_weg
    trigger: state
  - entity_id: water_heater.domestic_hot_water_tank
    attribute: current_temperature
    above: 35
    id: handmatig_klaar
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.warmtepompboost
    state: 'on'
  actions:
  - choose:
    - conditions:
      - or:
        - condition: trigger
          id: knop_uit
        - condition: trigger
          id: max_temp
      sequence:
      - action: water_heater.set_operation_mode
        target:
          entity_id: water_heater.domestic_hot_water_tank
        data:
          operation_mode: 'on'
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.warmtepompboost
      - action: telegram_bot.send_message
        data:
          title: ⏹️ WP Status Update
          chat_id: '-1001731338740'
          message_thread_id: '44275'
          parse_mode: html
          message: '✅ <b>BOOST GESTOPT</b>


            Tank is {{ state_attr(''water_heater.domestic_hot_water_tank'', ''current_temperature'')
            }}°C. Terug naar normale modus.'
    - conditions:
      - or:
        - condition: trigger
          id: zon_weg
        - condition: trigger
          id: handmatig_klaar
      sequence:
      - if:
        - condition: state
          entity_id: binary_sensor.warmtepomp_boost_zon_overschot
          state: 'off'
        - condition: numeric_state
          entity_id: water_heater.domestic_hot_water_tank
          attribute: current_temperature
          above: 35
        then:
        - action: water_heater.set_operation_mode
          target:
            entity_id: water_heater.domestic_hot_water_tank
          data:
            operation_mode: 'on'
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.warmtepompboost
        - action: telegram_bot.send_message
          data:
            title: ⏹️ WP Status Update
            chat_id: '-1001731338740'
            message_thread_id: '44275'
            parse_mode: html
            message: '✅ <b>BOOST GESTOPT</b>


              Tank is {{ state_attr(''water_heater.domestic_hot_water_tank'', ''current_temperature'')
              }}°C. Terug naar normale modus.'
  mode: restart
- id: '1773002207202'
  alias: Carport presence - AI Analyse naar Telegram
  description: Geavanceerde AI analyse van de carport met 15 seconden wachttijd voor
    het antwoord
  triggers:
  - entity_id: binary_sensor.presense_carport_presence
    to: 'on'
    trigger: state
  actions:
  - target:
      entity_id: camera.frigate_carport
    data:
      filename: '{{ snapshot_path }}'
    action: camera.snapshot
  - action: ai_task.generate_data
    data:
      task_name: Carport Analyse
      entity_id: ai_task.google_ai_task
      instructions: "Je bent een analytische beveiligingsexpert. Analyseer de afbeelding
        van de carport.\n**Context (Standaard situatie):** - Een witte BMW (van Kim)
        en een witte Volvo (van Rob) staan normaal geparkeerd.\n**Jouw opdracht:**
        1. Analyseer het volledige beeld, maar benoem de standaard situatie (BMW/Volvo
        aanwezig) NIET, tenzij een voertuig ontbreekt.  2. Als een auto ontbreekt,
        trek dan direct de conclusie: \"Kim is afwezig\" (bij ontbrekende BMW) of
        \"Rob is afwezig\" (bij ontbrekende Volvo). 3. Identificeer de bron van de
        beweging: Wie of wat is er in beeld? Maak een onderscheid tussen:\n   - Bezorgdiensten
        (let op logo's op busjes of kleding zoals PostNL, DHL, GLS).\n   - Personen
        (beschrijf type: kind, volwassene, postbode) en hun actie.\n   - Dieren of
        onbekende voertuigen.\n4. Rapporteer ALLEEN afwijkingen van de normale rustsituatie.
        Als alles normaal is en er staat slechts een persoon in beeld, focus dan volledig
        op die persoon.\nSchrijf je rapport in het Nederlands, zakelijk en to-the-point
        (max 3-4 zinnen).  Begin direct met de belangrijkste waarneming.\n"
      attachments:
      - media_content_id: media-source://camera/camera.frigate_carport
        media_content_type: image/jpeg
        metadata:
          title: Frigate Carport
          thumbnail: /api/camera_proxy/camera.frigate_carport
          media_class: video
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: app
            media_content_id: media-source://camera
    response_variable: ai_antwoord
  - delay: 00:00:15
  - action: telegram_bot.send_photo
    data:
      config_entry_id: 01K07Q4BWNVF9FKK82NGMHYPEC
      chat_id:
      - '-1001731338740'
      message_thread_id: '44274'
      file: '{{ snapshot_path }}'
      caption: '*Carport Analyse:* {{ ai_antwoord.predictions.text if ai_antwoord.predictions
        is defined else ai_antwoord.text }}

        '
  variables:
    snapshot_path: /config/www/pictures/carport_analysis.jpg
  mode: single
- id: '1773579181068'
  alias: 'Melding: Batterijen bijna leeg'
  description: Stuurt een Telegram bericht wanneer een batterij onder de 20% komt,
    zonder telefoons.
  triggers:
  - at: '10:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: "{% set threshold = 20 %} {% set batterijen = states.sensor \n
      \ | selectattr('attributes.device_class', 'defined')\n  | selectattr('attributes.device_class',
      'eq', 'battery')\n  | rejectattr('entity_id', 'search', 'phone|battery_level|mobile')\n
      \ | map(attribute='state')\n  | select('is_number')\n  | map('int')\n  | select('lt',
      threshold)\n  | list %}\n{{ batterijen | count > 0 }}"
  actions:
  - action: telegram_bot.send_message
    data:
      chat_id: '-1001731338740'
      message_thread_id: '44275'
      parse_mode: html
      title: <b>Vervangen batterijen</b>
      message: "De volgende batterijen moeten worden vervangen: {%- set threshold
        = 20 -%} {%- set ns = namespace(sensors=[]) -%} {%- for state in states.sensor
        \n    | selectattr('attributes.device_class', 'defined') \n    | selectattr('attributes.device_class',
        'eq', 'battery') -%}\n  {%- if state.state | is_number and state.state | int
        < threshold \n      and not (state.entity_id is search('phone|battery_level|mobile'))
        -%}\n    {%- set ns.sensors = ns.sensors + [state.name ~ ' (' ~ state.state
        ~ '%)'] -%}\n  {%- endif -%}\n{%- endfor %}\n- {{ ns.sensors | join('\\n-
        ') }}"
  mode: single
