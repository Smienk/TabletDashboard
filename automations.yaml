- id: '1766875710598'
  alias: 'Master Energie Strategie: Daikin & Jacuzzi V3.0'
  description: Gecombineerde sturing voor warmtepomp en jacuzzi. Oplossing voor price_in_3h
    error.
  triggers:
  - trigger: time_pattern
    minutes: /15
  - trigger: state
    entity_id: binary_sensor.warmtepomp_zon_overschot_stabiel
  - trigger: numeric_state
    entity_id: sensor.woonkamertemperatuur_temperature
    below: 19.5
  - trigger: homeassistant
    event: start
  actions:
  - variables:
      prices_list: '{{ state_attr(''sensor.tibber_forecast_prices'', ''prices'') }}'
      current_price: '{{ states(''sensor.tibber_forecast_prices'') | float(0) }}'
      avg_price_day: "{% if prices_list %}\n  {{ prices_list | map(attribute='price')
        | list | sum / prices_list | count }}\n{% else %} 0 {% endif %}\n"
      price_in_3h: "{% if prices_list and prices_list | count > 12 %}\n  {{ prices_list[12].price
        | float(0) }}\n{% elif prices_list %}\n  {{ prices_list[-1].price | float(0)
        }}\n{% else %}\n  0\n{% endif %}\n"
      room_temp: '{{ states(''sensor.woonkamertemperatuur_temperature'') | float(20)
        }}'
      outside_temp_avg: '{{ states(''sensor.buitentemperatuur_24u_gemiddelde'') |
        float(15) }}'
      zon_actief: '{{ is_state(''binary_sensor.warmtepomp_zon_overschot_stabiel'',
        ''on'') }}'
      regel_naam: "{% if current_price < 0 %} \U0001F911 Negatieve Prijs (Max Verbruik)
        {% elif room_temp < 19.5 %} \U0001F321️ Comfort WP (Koud) {% elif current_price
        > (avg_price_day * 1.05) and room_temp > 19.8 %} \U0001F4C9 Coasting (Besparen)
        {% elif zon_actief %} ☀️ Zon-overschot (Laden) {% elif price_in_3h > (current_price
        * 1.4) and current_price < avg_price_day and current_price < 0.25 %} \U0001F680
        Pre-heating (Opslag) {% elif current_price < (avg_price_day * 0.9) and current_price
        < 0.25 %} \U0001F50B Thermal Battery (Laden) {% else %} ⚖️ Neutrale Balans
        {% endif %}\n"
      new_wp_offset: '{% if "Negatieve" in regel_naam %} 3 {% elif "Comfort" in regel_naam
        %} 2 {% elif "Coasting" in regel_naam %} -3 {% elif "Zon" in regel_naam %}
        2 {% elif "Pre-heating" in regel_naam %} 2 {% elif "Battery" in regel_naam
        %} 1 {% else %} 0 {% endif %}

        '
      new_wp_mode: '{% set ot = outside_temp_avg %} {% set rt = room_temp %}  {% if
        current_price < 0 %} {{ ''heating'' if ot < 20 else ''cooling'' }}  {% elif
        rt < 19.0 %} heating {% elif rt > 26.0 %} cooling  {% elif ot < 15.0 %} heating
        {% elif ot > 22.0 %} cooling  {% else %} auto {% endif %}

        '
      new_spa_temp: '{% if "Negatieve" in regel_naam %} 41.0 {% elif "Coasting" in
        regel_naam %} 38.0 {% elif "Zon" in regel_naam %} 40.0 {% elif "Pre-heating"
        in regel_naam %} 40.0 {% elif "Battery" in regel_naam %} 40.0 {% else %} 39.0
        {% endif %}

        '
  - action: select.select_option
    target:
      entity_id: select.operation_mode
    data:
      option: '{{ new_wp_mode }}'
  - if:
    - condition: template
      value_template: '{{ new_wp_offset != (states(''number.temperature_control'')
        | float(0)) and new_wp_mode != ''off'' }}'
    then:
    - action: number.set_value
      target:
        entity_id: number.temperature_control
      data:
        value: '{{ new_wp_offset }}'
  - if:
    - condition: template
      value_template: '{{ states(''number.spa_target_desired_temperature'') | float(0)
        != new_spa_temp | float(0) }}'
    then:
    - action: number.set_value
      target:
        entity_id: number.spa_target_desired_temperature
      data:
        value: '{{ new_spa_temp }}'
  - action: input_text.set_value
    target:
      entity_id: input_text.warmtepomp_actieve_regel
    data:
      value: '{{ regel_naam }}'
  mode: restart
