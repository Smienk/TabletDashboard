- id: '1768739651749'
  alias: Pepper Uitlaatschema via Google Calendar
  description: Leest de agenda 'uitlaten_pepper' en update de status sensoren
  triggers:
  - minutes: /30
    trigger: time_pattern
  - entity_id: calendar.uitlaten_pepper
    trigger: state
  - event: start
    trigger: homeassistant
  actions:
  - target:
      entity_id: calendar.uitlaten_pepper
    data:
      start_date_time: '{{ today_at(''00:00'') }}'
      end_date_time: '{{ today_at(''23:59'') }}'
    response_variable: agenda
    action: calendar.get_events
  - variables:
      events: '{{ agenda[''calendar.uitlaten_pepper''].events | sort(attribute=''start'')
        }}'
      current_person: '{% set active = events | selectattr(''start'', ''lt'', now().isoformat())
        | selectattr(''end'', ''gt'', now().isoformat()) | list %} {{ active[0].summary
        if active | count > 0 else ''Niemand'' }}

        '
      daily_text: "{% if events | count >= 3 %}\n  Ochtend: {{ events[0].summary }},
        Middag: {{ events[1].summary }}, Avond: {{ events[2].summary }}\n{% elif events
        | count > 0 %}\n  {% set parts = ns(items=[]) %}\n  {% for e in events %}\n
        \   {% set parts.items = parts.items + [e.summary] %}\n  {% endfor %}\n  Schema:
        {{ parts.items | join(', ') }}\n{% else %}\n  Geen schema gevonden in agenda\n{%
        endif %}\n"
  - target:
      entity_id: input_text.dogwalkinglist
    data:
      value: '{{ current_person }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.dogwalkingschedule
    data:
      value: '{{ daily_text }}'
    action: input_text.set_value
  mode: restart
