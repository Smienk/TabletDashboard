views:
  - title: Home
    type: sections
    sections:
      - cards:
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - entity: sensor.twente_milieu_packages_waste_pickup
                    state_not: None
                  - entity: sensor.twente_milieu_packages_waste_pickup
                    state_not: unknown
                card:
                  type: custom:button-card
                  entity: sensor.twente_milieu_packages_waste_pickup
                  aspect_ratio: 1.5/1
                  show_name: false
                  styles:
                    card:
                      - background-color: '#161616'
                      - border-radius: 20px
                      - border: 1px solid '#2a2a2a'
                    icon:
                      - width: 45%
                      - color: |
                          [[[
                            const nu = new Date().setHours(0,0,0,0);
                            const d1 = (new Date(states['sensor.twente_milieu_packages_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d2 = (new Date(states['sensor.twente_milieu_organic_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d3 = (new Date(states['sensor.twente_milieu_paper_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            
                            let kleuren = [];
                            if (d1 === 0 || d1 === 1) kleuren.push('#ffa500');
                            if (d2 === 0 || d2 === 1) kleuren.push('#00FF00');
                            if (d3 === 0 || d3 === 1) kleuren.push('#00d4ff');

                            if (kleuren.length === 1) return kleuren[0];
                            if (kleuren.length >= 2) return 'white'; 
                            return '#3d3d3d';
                          ]]]
                      - background-image: |
                          [[[
                            const nu = new Date().setHours(0,0,0,0);
                            const d1 = (new Date(states['sensor.twente_milieu_packages_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d2 = (new Date(states['sensor.twente_milieu_organic_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d3 = (new Date(states['sensor.twente_milieu_paper_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            
                            let kleuren = [];
                            if (d1 === 0 || d1 === 1) kleuren.push('#ffa500');
                            if (d2 === 0 || d2 === 1) kleuren.push('#00FF00');
                            if (d3 === 0 || d3 === 1) kleuren.push('#00d4ff');

                            if (kleuren.length >= 2) {
                              return `linear-gradient(to bottom, ${kleuren[0]} 0%, ${kleuren[0]} 50%, ${kleuren[1]} 50%, ${kleuren[1]} 100%)`;
                            }
                            return 'none';
                          ]]]
                      - '-webkit-background-clip': text
                      - '-webkit-text-fill-color': |
                          [[[
                            const nu = new Date().setHours(0,0,0,0);
                            const d1 = (new Date(states['sensor.twente_milieu_packages_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d2 = (new Date(states['sensor.twente_milieu_organic_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            const d3 = (new Date(states['sensor.twente_milieu_paper_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                            let actief = (d1===0||d1===1?1:0) + (d2===0||d2===1?1:0) + (d3===0||d3===1?1:0);
                            return actief >= 2 ? 'transparent' : 'inherit';
                          ]]]
                    custom_fields:
                      status:
                        - position: absolute
                        - bottom: 5%
                        - left: 50%
                        - transform: translateX(-50%)
                        - width: 100%
                        - font-size: 10px
                        - font-weight: bold
                        - line-height: 1.2
                  icon: |
                    [[[
                      const nu = new Date().setHours(0,0,0,0);
                      const d1 = (new Date(states['sensor.twente_milieu_packages_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                      const d2 = (new Date(states['sensor.twente_milieu_organic_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                      const d3 = (new Date(states['sensor.twente_milieu_paper_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                      
                      let c = 0;
                      let i = 'mdi:delete-empty';
                      if (d1 === 0 || d1 === 1) { c++; i = 'mdi:recycle'; }
                      if (d2 === 0 || d2 === 1) { c++; i = 'mdi:leaf'; }
                      if (d3 === 0 || d3 === 1) { c++; i = 'mdi:file-document-outline'; }
                      
                      return c > 1 ? 'mdi:delete-restore' : i;
                    ]]]
                  custom_fields:
                    status: |
                      [[[
                        const nu = new Date().setHours(0,0,0,0);
                        const d1 = (new Date(states['sensor.twente_milieu_packages_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                        const d2 = (new Date(states['sensor.twente_milieu_organic_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                        const d3 = (new Date(states['sensor.twente_milieu_paper_waste_pickup']?.state).setHours(0,0,0,0) - nu) / 864e5;
                        
                        let res = "";
                        if (d1 === 0 || d1 === 1) res += `<div style="color: #ffa500;">PMD - ${d1 === 0 ? 'VANDAAG' : 'MORGEN'}</div>`;
                        if (d2 === 0 || d2 === 1) res += `<div style="color: #00FF00;">GFT - ${d2 === 0 ? 'VANDAAG' : 'MORGEN'}</div>`;
                        if (d3 === 0 || d3 === 1) res += `<div style="color: #00d4ff;">PAPIER - ${d3 === 0 ? 'VANDAAG' : 'MORGEN'}</div>`;
                        return res;
                      ]]]
              - type: custom:button-card
                entity: input_text.dogwalkinglist
                icon: mdi:dog-side
                aspect_ratio: 1.5/1
                show_name: false
                show_state: false
                styles:
                  card:
                    - background-color: '#161616'
                    - border-radius: 20px
                    - border: 2px solid
                    - border-color: |
                        [[[
                          const s = entity.state.toLowerCase();
                          if (s.includes('daan')) return '#0000FF';
                          if (s.includes('eva')) return '#FF0000';
                          if (s.includes('papa') || s.includes('mama')) return '#008000';
                          return '#2a2a2a';
                        ]]]
                    - padding: 5px
                  grid:
                    - grid-template-areas: '"i" "ochtend" "middag" "avond"'
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr min-content min-content min-content
                  icon:
                    - width: 25%
                    - color: |
                        [[[
                          const s = entity.state.toLowerCase();
                          if (s.includes('daan')) return '#0000FF';
                          if (s.includes('eva')) return '#FF0000';
                          if (s.includes('papa') || s.includes('mama')) return '#008000';
                          return '#ffa500';
                        ]]]
                    - grid-area: i
                    - filter: |
                        [[[
                          const s = entity.state.toLowerCase();
                          let color = '';
                          if (s.includes('daan')) color = '#0000FF';
                          else if (s.includes('eva')) color = '#FF0000';
                          else if (s.includes('papa') || s.includes('mama')) color = '#008000';
                          else return 'none';
                          return `drop-shadow(0px 0px 5px ${color})`;
                        ]]]
                  custom_fields:
                    ochtend:
                      - justify-self: center
                      - align-self: center
                      - width: 90%
                    middag:
                      - justify-self: center
                      - align-self: center
                      - width: 90%
                    avond:
                      - justify-self: center
                      - align-self: center
                      - width: 90%
                custom_fields:
                  ochtend: |
                    [[[
                      const lijst = states['input_text.dogwalkingschedule']?.state.split(',') || [];
                      let tekst = lijst[0] ? lijst[0].trim() : 'Onbekend';
                      const isActief = entity.state.toLowerCase().includes(tekst.toLowerCase().replace('ochtend: ', '')) && entity.state !== 'Niemand';
                      const kleur = isActief ? '#ffffff' : '#404040';
                      const border = isActief ? '1px solid rgba(255,255,255,0.3)' : '1px solid transparent';
                      const bg = isActief ? 'rgba(255,255,255,0.05)' : 'transparent';
                      return `<div style="color: ${kleur}; font-size: 11px; font-weight: ${isActief ? 'bold' : 'normal'}; border: ${border}; background-color: ${bg}; border-radius: 4px; padding: 2px 4px; text-align: center;">${tekst}</div>`;
                    ]]]
                  middag: |
                    [[[
                      const lijst = states['input_text.dogwalkingschedule']?.state.split(',') || [];
                      let tekst = lijst[1] ? lijst[1].trim() : 'Onbekend';
                      const isActief = entity.state.toLowerCase().includes(tekst.toLowerCase().replace('middag: ', '')) && entity.state !== 'Niemand';
                      const kleur = isActief ? '#ffffff' : '#404040';
                      const border = isActief ? '1px solid rgba(255,255,255,0.3)' : '1px solid transparent';
                      const bg = isActief ? 'rgba(255,255,255,0.05)' : 'transparent';
                      return `<div style="color: ${kleur}; font-size: 11px; font-weight: ${isActief ? 'bold' : 'normal'}; border: ${border}; background-color: ${bg}; border-radius: 4px; padding: 2px 4px; text-align: center;">${tekst}</div>`;
                    ]]]
                  avond: |
                    [[[
                      const lijst = states['input_text.dogwalkingschedule']?.state.split(',') || [];
                      let tekst = lijst[2] ? lijst[2].trim() : 'Onbekend';
                      const isActief = entity.state.toLowerCase().includes(tekst.toLowerCase().replace('avond: ', '')) && entity.state !== 'Niemand';
                      const kleur = isActief ? '#ffffff' : '#404040';
                      const border = isActief ? '1px solid rgba(255,255,255,0.3)' : '1px solid transparent';
                      const bg = isActief ? 'rgba(255,255,255,0.05)' : 'transparent';
                      return `<div style="color: ${kleur}; font-size: 11px; font-weight: ${isActief ? 'bold' : 'normal'}; border: ${border}; background-color: ${bg}; border-radius: 4px; padding: 2px 4px; text-align: center;">${tekst}</div>`;
                    ]]]
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                entity: input_boolean.warmtepomp_handmatige_activatie
                icon: mdi:rocket-launch
                aspect_ratio: 1.5/1
                name: Boost
                show_name: true
                styles:
                  card:
                    - background-color: '#161616'
                    - border-radius: 20px
                    - border: 1px solid '#2a2a2a'
                  icon:
                    - width: 40%
                    - color: >-
                        [[[ return entity.state === 'on' ? '#00d4ff' :
                        '#3d3d3d'; ]]]
                  name:
                    - font-size: 12px
                    - color: '#B5B5B5'
                    - font-weight: bold
                state:
                  - value: 'on'
                    styles:
                      card:
                        - border: 1px solid '#00d4ff'
              - type: custom:button-card
                entity: sensor.showertime
                icon: mdi:shower-head
                aspect_ratio: 1.5/1
                show_name: false
                show_state: true
                styles:
                  card:
                    - background-color: '#161616'
                    - border-radius: 20px
                    - border: 1px solid '#2a2a2a'
                  icon:
                    - width: 40%
                    - color: >-
                        [[[ return states['input_boolean.warmtepompboost'].state
                        === 'on' ? '#ff4d4d' : '#00d4ff'; ]]]
                    - animation: |
                        [[[ 
                          return states['input_boolean.warmtepompboost'].state === 'on' 
                          ? 'pulse_red 2s infinite' 
                          : 'none'; 
                        ]]]
                  state:
                    - font-size: 14px
                    - font-weight: bold
                    - color: '#B5B5B5'
                extra_styles: |
                  @keyframes pulse_red {
                    0% { transform: scale(1); filter: drop-shadow(0 0 2px #ff4d4d); }
                    50% { transform: scale(1.1); filter: drop-shadow(0 0 12px #ff4d4d); }
                    100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff4d4d); }
                  }
              - type: custom:button-card
                entity: input_boolean.vaatwassergevuld
                icon: mdi:dishwasher
                aspect_ratio: 1.5/1
                show_name: false
                show_label: true
                styles:
                  card:
                    - background-color: '#161616'
                    - border-radius: 20px
                    - border: 1px solid '#2a2a2a'
                    - position: relative
                  grid:
                    - grid-template-areas: '"prog_status" "i" "l"'
                    - grid-template-rows: 25% 1fr min-content
                  icon:
                    - width: 40%
                    - color: >-
                        [[[ return entity.state === 'on' ? '#00d4ff' :
                        '#3d3d3d'; ]]]
                    - filter: >-
                        [[[ return entity.state === 'on' ? 'drop-shadow(0 0 8px
                        #00d4ff)' : 'none'; ]]]
                  label:
                    - font-size: 12px
                    - color: '#B5B5B5'
                    - font-weight: bold
                    - padding-bottom: 10px
                  custom_fields:
                    prog_status:
                      - align-self: start
                      - justify-self: center
                      - font-size: 13px
                      - font-weight: bold
                      - color: '#00d4ff'
                      - padding-top: 10px
                    snel:
                      - position: absolute
                      - top: 12%
                      - right: 10%
                    eco:
                      - position: absolute
                      - bottom: 20%
                      - right: 10%
                custom_fields:
                  prog_status: |
                    [[[
                      const isSnel = states['input_boolean.vaatwassersnelprog'].state === 'on';
                      const isEco = states['input_boolean.vaatwasserecoprog'].state === 'on';
                      if (isSnel) return "SNEL";
                      if (isEco) return "ECO";
                      return "GEEN";
                    ]]]
                  snel:
                    card:
                      type: custom:button-card
                      entity: input_boolean.vaatwassersnelprog
                      icon: mdi:flash
                      show_name: false
                      styles:
                        card:
                          - width: 34px
                          - height: 34px
                          - border-radius: 8px
                          - border: >-
                              [[[ return entity.state === 'on' ? '2px solid
                              #ffa500' : '1px solid #2a2a2a'; ]]]
                          - background-color: >-
                              [[[ return entity.state === 'on' ? 'rgba(255, 165,
                              0, 0.2)' : '#101010'; ]]]
                          - filter: >-
                              [[[ return entity.state === 'on' ? 'none' :
                              'grayscale(100%) opacity(0.5)'; ]]]
                        icon:
                          - width: 22px
                          - color: >-
                              [[[ return entity.state === 'on' ? '#ffa500' :
                              '#444'; ]]]
                  eco:
                    card:
                      type: custom:button-card
                      entity: input_boolean.vaatwasserecoprog
                      icon: mdi:leaf
                      show_name: false
                      styles:
                        card:
                          - width: 34px
                          - height: 34px
                          - border-radius: 8px
                          - border: >-
                              [[[ return entity.state === 'on' ? '2px solid
                              #00ff96' : '1px solid #2a2a2a'; ]]]
                          - background-color: >-
                              [[[ return entity.state === 'on' ? 'rgba(0, 255,
                              150, 0.15)' : '#101010'; ]]]
                          - filter: >-
                              [[[ return entity.state === 'on' ? 'none' :
                              'grayscale(100%) opacity(0.5)'; ]]]
                        icon:
                          - width: 20px
                          - color: >-
                              [[[ return entity.state === 'on' ? '#00ff96' :
                              '#444'; ]]]
                label: |
                  [[[
                    const gevuld = entity.state === 'on';
                    const progress = states['sensor.012030387010009525_bsh_common_option_programprogress']?.state;
                    
                    // We gebruiken nu de input_datetime helper
                    const starttijd_state = states['input_datetime.vaatwasser_geplande_starttijd'];
                    
                    // 1. Tijdens het draaien
                    if (progress > 0 && progress < 100) {
                        return `Bezig: ${progress}%`;
                    }
                    
                    // 2. Uit-stand
                    if (!gevuld) return 'Vaatwasser UIT';

                    // 3. Starttijd uit de helper halen
                    if (starttijd_state) {
                        // We pakken de uren en minuten direct uit de attributen van de helper
                        const uren = String(starttijd_state.attributes.hour).padStart(2, '0');
                        const minuten = String(starttijd_state.attributes.minute).padStart(2, '0');
                        
                        // Check of de helper wel een geldige tijd heeft (niet 00:00 tenzij dat echt de bedoeling is)
                        if (starttijd_state.state === '1970-01-01 00:00:00') return "Berekenen...";
                        
                        return `Start om ${uren}:${minuten}`;
                    }

                    return "Wachten op planning...";
                  ]]]
              - type: custom:button-card
                entity: input_text.warmtepomp_actieve_regel
                icon: mdi:heat-pump
                aspect_ratio: 1.5/1
                show_name: false
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: warmtepomp-status
                hold_action:
                  action: more-info
                styles:
                  card:
                    - background-color: '#161616'
                    - border-radius: 20px
                    - border: 1px solid "#2a2a2a"
                  icon:
                    - width: 40%
                    - color: |
                        [[[
                          if (!entity || !entity.state || entity.state === 'unknown') return '#00d4ff';
                          const s = entity.state.toLowerCase();
                          if (s.includes('negatief')) return '#00ff96';
                          if (s.includes('laden')) return '#00d4ff';
                          if (s.includes('besparen')) return '#ff4d4d';
                          if (s.includes('zon')) return '#ffcc00';
                          return '#00d4ff';
                        ]]]
                  state:
                    - font-size: 14px
                    - font-weight: bold
                    - color: '#B5B5B5'
      - cards:
          - type: horizontal-stack
            cards:
              - type: energy-grid-neutrality-gauge
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.p1_meter_3c39e72a40ce_active_power
                    icon: mdi:flash
                    primary_info: state
                    secondary_info: name
                    name: Meterkast
                    tap_action:
                      action: navigate
                      navigation_path: /tablet-dashboard/klimaat_energie
                    card_mod:
                      style: |
                        ha-card {
                          background-color: #161616 !important;
                          border-radius: 20px !important;
                          box-shadow: none !important;
                          transition: border 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
                          
                          {% set verbruik = states('sensor.p1_meter_3c39e72a40ce_active_power') | float %}
                          
                          {% if verbruik < 1500 %}
                            border: 1px solid rgba(76, 175, 80, 0.7) !important;
                            box-shadow: 0 0 10px rgba(76, 175, 80, 0.1) !important;
                            --card-mod-icon-color: #4caf50;
                          {% elif verbruik < 3000 %}
                            border: 1px solid rgba(255, 165, 0, 0.7) !important;
                            box-shadow: 0 0 10px rgba(255, 165, 0, 0.1) !important;
                            --card-mod-icon-color: #ffa500;
                          {% else %}
                            border: 1px solid rgba(244, 67, 54, 0.7) !important;
                            box-shadow: 0 0 15px rgba(244, 67, 54, 0.2) !important;
                            --card-mod-icon-color: #f44336;
                          {% endif %}
                        }
                  - type: custom:mushroom-entity-card
                    entity: sensor.solax_huis_today
                    name: Zonnepanelen
                    icon: mdi:solar-power
                    primary_info: state
                    secondary_info: name
                    card_mod:
                      style: |
                        ha-card {
                          background-color: #161616 !important;
                          border-radius: 20px !important;
                          box-shadow: none !important;
                          transition: border 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
                          
                          {% set opbrengst = states('sensor.solax_huis_today') | float %}
                          
                          {% if opbrengst < 2 %}
                            border: 1px solid rgba(181, 181, 181, 0.3) !important;
                            --card-mod-icon-color: #b5b5b5;
                          {% elif opbrengst < 25 %}
                            border: 1px solid rgba(0, 212, 255, 0.6) !important;
                            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1) !important;
                            --card-mod-icon-color: #00d4ff;
                          {% else %}
                            border: 1px solid rgba(255, 215, 0, 0.7) !important;
                            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2) !important;
                            --card-mod-icon-color: #ffd700;
                          {% endif %}
                        }
          - type: vertical-stack
            layout_options:
              grid_columns: full
            cards:
              - type: custom:apexcharts-card
                graph_span: 48h
                update_interval: 1h
                style: |
                  ha-card {
                    background-color: transparant !important;
                    border: none !important;
                    box-shadow: none !important;
                  }
                apex_config:
                  chart:
                    height: 280px
                    background: transparant
                    foreColor: '#999'
                    fontFamily: Roboto, sans-serif
                    toolbar:
                      show: false
                  legend:
                    show: true
                    position: bottom
                    labels:
                      colors: '#B5B5B5'
                  grid:
                    borderColor: '#2a2a2a'
                    strokeDashArray: 4
                show:
                  last_updated: false
                span:
                  start: day
                header:
                  show: true
                  title: Stroomprijs & Zon
                  show_states: true
                  colorize_states: true
                yaxis:
                  - id: price
                    decimals: 2
                    apex_config:
                      title:
                        text: ct/kWh
                        style:
                          color: '#B5B5B5'
                  - id: solar
                    opposite: true
                    decimals: 0
                    apex_config:
                      title:
                        text: Watt
                        style:
                          color: '#B5B5B5'
                now:
                  show: true
                  color: '#ff4d4d'
                  label: Nu
                series:
                  - entity: sensor.rob_smienk_elektriciteitsprijs
                    name: Electra prijs
                    yaxis_id: price
                    color: '#ffa500'
                    type: area
                    curve: stepline
                    stroke_width: 2
                    opacity: 0.3
                    show:
                      legend_value: true
                    data_generator: |
                      var xnow = moment().startOf("day").add("days", 2); 
                      var strtwoday = xnow.format("YYYY-MM-DD HH:mm:ssZ");
                      var result = await hass.connection.sendMessagePromise({
                          type: 'call_service',
                          domain: 'tibber',
                          service: 'get_prices',
                          return_response: true,
                          service_data: { end: strtwoday }
                      }).then((result) => {
                          var data = Object.values(result.response.prices)[0];
                          return data.map((p) => { return [p.start_time, p.price * 100]; });
                      });
                      return result;
                  - entity: sensor.solax_now
                    name: Zonnestroom
                    yaxis_id: solar
                    color: '#00d4ff'
                    type: line
                    stroke_width: 3
                    show:
                      legend_value: true
        column_span: 2
    badges:
      - type: custom:button-card
        name: |
          [[[
            const date = new Date();
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
          ]]]
        label: |
          [[[
            const d = new Date();
            const opties = { weekday: 'long', day: 'numeric', month: 'long' };
            return d.toLocaleDateString('nl-NL', opties);
          ]]]
        show_label: true
        styles:
          card:
            - background-color: transparent
            - border: none
            - box-shadow: none
            - padding: 20px 0px 30px 0px
          grid:
            - grid-template-areas: '"n" "l"'
          name:
            - justify-self: center
            - font-size: 64px
            - font-weight: 900
            - color: '#ffffff'
            - line-height: 1
          label:
