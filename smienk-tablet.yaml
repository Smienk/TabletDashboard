  - title: Warmtepomp Status
    path: warmtepomp-status
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: 🤖 Systeem Analyse
          - type: markdown
            content: >
              {% set nu_24u = states('sensor.p1_verbruik_gemiddelde_24u') |
              float(0) %}  {% set oud_24u =
              states('sensor.p1_verbruik_gemiddelde_48u') | float(0) %}  {% set
              verschil = nu_24u - oud_24u %}  {% set strategie =
              states('input_text.warmtepomp_actieve_regel') %}  {% set temp =
              states('sensor.woonkamertemperatuur_temperature') | float(0) %}

              {# Correcte prijs extractie conform jouw werkende automatisering
              #} {% set prijs_nu = states('sensor.tibber_forecast_prices') |
              float(0) %} {% set prices_list =
              state_attr('sensor.tibber_forecast_prices', 'prices') %} {% set
              prijs_3h = prices_list[12].price | float(0) if (prices_list and
              prices_list | count > 12) else prijs_nu %}

              ## <center> 📊 **Systeem Analyse V2.7** </center>

              ---

              ### **Energieverbruik (vs. Gisteren)** Het gemiddelde verbruik
              over de afgelopen 24u is **{{ nu_24u | round(0) }} Watt**.

              {% if verschil > 10 %}
                <font color="#ff4d4d">**📈 Verhoogd verbruik:**</font> Je verbruikt gemiddeld **{{ verschil | abs | round(0) }}W meer** dan gisteren.
              {% elif verschil < -10 %}
                <font color="#00ff96">**📉 Besparing:**</font> Je verbruikt gemiddeld **{{ verschil | abs | round(0) }}W minder** dan gisteren.
              {% else %}
                <font color="#999999">**⚖️ Stabiel:**</font> Het verbruik is nagenoeg gelijk aan gisteren.
              {% endif %}

              ---

              ### **Huidige Status** **Strategie:** {% if 'Coasting' in
              strategie %}<font color="#ff4d4d">**{{ strategie }}**</font> {%
              elif 'Laden' in strategie or 'Zon' in strategie or 'Negatieve' in
              strategie or 'Pre-heating' in strategie %}<font
              color="#00d4ff">**{{ strategie }}**</font> {% else %}<font
              color="#ffffff">**{{ strategie }}**</font>{% endif %}

              **Woonkamer:** `{{ temp }}°C` | **Prijs nu:** `€{{ prijs_nu |
              round(3) }}`

              **Prijsverwachting (3u): ** `€{{ prijs_3h | round(3) }}` {% if
              prijs_nu > 0.001 %}
                {% set stijging = ((prijs_3h / prijs_nu) - 1) * 100 %}
                {% if stijging > 20 %} 📈 Sterke stijging (+{{ stijging | round(0) }}%) 
                {% elif stijging < -20 %} 📉 Sterke daling ({{ stijging | round(0) }}%)
                {% else %} ⚖️ Stabiel verloop {% endif %}
              {% else %}
                🤑 Prijs is nagenoeg nul of negatief
              {% endif %}

              ---

              ### **🤖 Conclusie & Advies** {% if 'Coasting' in strategie %}
                ✅ **Efficiëntie:** De warmtepomp staat in *besparingsmodus*. De daling in verbruik is gewenst om de piektarieven te ontwijken.
              {% elif 'Pre-heating' in strategie %}
                🚀 **Anticipatie:** Het systeem warmt nu extra op omdat de prijzen over 3 uur fors hoger zijn (**€{{ prijs_3h | round(3) }}**).
              {% elif 'Laden' in strategie or 'Zon' in strategie or 'Negatieve'
              in strategie %}
                ⚡ **Optimalisatie:** Je verbruikt nu bewust meer energie. Je laadt de woning/boiler op met goedkope stroom of zon.
              {% elif temp < 19.5 %}
                ⚠️ **Aandacht:** De temperatuur is onder de comfortgrens (19.5°C). Het systeem negeert nu de prijs om je warm te houden.
              {% else %}
                ✨ **Balans:** Het systeem draait momenteel in een stabiele modus. Geen directe actie vereist.
              {% endif %}
      - cards:
          - type: heading
            heading: Monitoring
          - type: custom:button-card
