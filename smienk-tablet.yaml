    cards: []
  - title: Wellness & Water
    path: wellness_water
    type: sections
    max_columns: 2
    sections:
      - cards:
          - type: heading
            heading: Jacuzzi
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                entity: sensor.spa_current_temperature
                name: Spa Temp
                aspect_ratio: 2/1
                show_state: true
                show_name: false
                show_icon: false
                styles:
                  card:
                    - border-radius: 12px
                    - background-color: rgba(22, 22, 22, 0.8)
                    - border: |
                        [[[
                          var action = states['climate.spa_thermostat']?.attributes.hvac_action;
                          return action == 'heating' ? '2px solid #ff4d4d' : '1px solid #00ff96';
                        ]]]
                  grid:
                    - grid-template-areas: '"i heat" "s s" "n target"'
                    - grid-template-columns: 1fr 1fr
                    - grid-template-rows: 1fr 1fr min-content
                  icon:
                    - width: 28px
                    - color: |
                        [[[
                          var action = states['climate.spa_thermostat']?.attributes.hvac_action;
                          return action == 'heating' ? '#ff4d4d' : '#00ff96';
                        ]]]
                  state:
                    - font-size: 18px
                    - font-weight: bold
                    - justify-self: start
                    - padding-left: 15px
                  name:
                    - font-size: 11px
                    - color: '#777'
                    - justify-self: left
                    - padding-left: 5px
                  custom_fields:
                    heat:
                      - font-size: 9px
                      - font-weight: bold
                      - justify-self: end
                      - padding-right: 15px
                      - color: |
                          [[[
                            var action = states['climate.spa_thermostat']?.attributes.hvac_action;
                            return action == 'heating' ? '#ff4d4d' : '#808080';
                          ]]]
                    target:
                      - font-size: 10px
                      - color: '#808080'
                      - justify-self: end
                      - padding-right: 15px
                custom_fields:
                  heat: |
                    [[[
                      var action = states['climate.spa_thermostat']?.attributes.hvac_action;
                      return action == 'heating' ? 'VERWARMEN' : 'STANDBY';
                    ]]]
                  target: |
                    [[[
                      var raw_temp = parseFloat(states['sensor.spa_desired_temperature']?.state);
                      var target = (Math.round(raw_temp * 2) / 2).toFixed(1).replace('.', ',');
                      return "Doel: " + target + "°C";
                    ]]]
                tap_action:
                  action: more-info
                  entity: climate.spa_thermostat
              - type: custom:button-card
                entity: input_boolean.jacuzzi_onderhoud_status
                name: Onderhoud
                aspect_ratio: 2/1
                styles:
                  card:
                    - border-radius: 12px
                    - background-color: rgba(22, 22, 22, 0.8)
                    - border: >
                        [[[ return entity.state == 'on' ? '1px solid #00ff96' :
                        '2px solid #ff4d4d'; ]]]
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: 45px 1fr
                  icon:
                    - width: 30px
                    - color: >
                        [[[ return entity.state == 'on' ? '#00ff96' : '#ff4d4d';
                        ]]]
                  name:
                    - justify-self: start
                    - font-weight: 600
                    - font-size: 12px
                    - color: white
                state:
                  - value: 'on'
                    icon: mdi:check-decagram
                    name: OK
                  - value: 'off'
                    icon: mdi:alert-decagram
                    name: Nodig
            columns: 3
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                entity: switch.spa_pump_1
                name: Jets 1
                icon: mdi:weather-windy
                styles:
                  card:
                    - border-radius: 12px
                    - background-color: rgba(22, 22, 22, 0.8)
