                  name:
                    - font-size: 11px
                    - font-weight: 600
                    - color: >
                        [[[ return entity.state == 'on' ? 'white' : '#777777';
                        ]]]
            columns: 3
          - type: heading
            heading: Filter Cycli
          - type: custom:button-card
            name: Filter Programma
            icon: mdi:filter-cog
            styles:
              card:
                - border-radius: 12px
                - background-color: rgba(22, 22, 22, 0.8)
                - border: 1px solid rgba(255,255,255,0.05)
                - padding: 15px
              grid:
                - grid-template-areas: '"i n" "info info"'
                - grid-template-columns: 30px 1fr
              name:
                - justify-self: start
                - font-weight: bold
                - font-size: 14px
              custom_fields:
                info:
                  - padding-top: 15px
            custom_fields:
              info: |
                [[[
                  var f1_stat = states['sensor.spa_filter_1']?.state == 'ON' ? '🟢' : '⚪';
                  var f2_stat = states['sensor.spa_filter_2']?.state == 'ON' ? '🟢' : '⚪';
                  var t1 = states['select.spa_filter_time_1']?.state;
                  var d1 = states['select.spa_filter_duration_1']?.state;
                  var t2 = states['select.spa_filter_time_2']?.state;
                  var d2 = states['select.spa_filter_duration_2']?.state;
                  
                  return `
                    <div style="display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: #999;">
                      <div style="display: flex; justify-content: space-between;">
                        <span>${f1_stat} Cyclus 1</span>
                        <span>Start: <b>${t1}</b></span>
                        <span>Duur: <b>${d1}</b></span>
                      </div>
                      <div style="display: flex; justify-content: space-between;">
                        <span>${f2_stat} Cyclus 2</span>
                        <span>Start: <b>${t2}</b></span>
                        <span>Duur: <b>${d2}</b></span>
                      </div>
                    </div>
                  `;
                ]]]
